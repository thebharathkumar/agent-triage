<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Triage - Agent Observability</title>
  <meta name="description" content="Severity-ranked morning triage for multi-agent trace data. See what actually needs your attention today.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ------------------------------------------------------------------ */
    /* Design tokens                                                        */
    /* ------------------------------------------------------------------ */
    :root {
      --bg:          #0a0c14;
      --surface:     rgba(255,255,255,0.04);
      --surface-hov: rgba(255,255,255,0.07);
      --border:      rgba(255,255,255,0.09);
      --border-hov:  rgba(255,255,255,0.18);
      --text:        #e8eaf0;
      --muted:       #6b7280;
      --accent:      #6366f1;
      --accent-glow: rgba(99,102,241,0.25);

      --red:    #f87171;
      --orange: #fb923c;
      --yellow: #fbbf24;
      --green:  #34d399;
      --blue:   #60a5fa;
      --purple: #a78bfa;

      --card-radius: 16px;
      --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle radial glow behind everything */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(99,102,241,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(168,85,247,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ------------------------------------------------------------------ */
    /* Layout                                                               */
    /* ------------------------------------------------------------------ */
    .page {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ------------------------------------------------------------------ */
    /* Header                                                               */
    /* ------------------------------------------------------------------ */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      box-shadow: 0 0 24px rgba(99,102,241,0.4);
    }

    .logo-text {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, #e8eaf0 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-sub {
      font-size: 0.7rem;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      -webkit-text-fill-color: var(--muted);
    }

    .header-meta {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .refresh-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 0.8rem;
      padding: 0.45rem 0.9rem;
      border-radius: 8px;
      cursor: pointer;
      transition: background var(--transition), border-color var(--transition);
    }
    .refresh-btn:hover {
      background: var(--surface-hov);
      border-color: var(--border-hov);
    }

    .countdown {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* ------------------------------------------------------------------ */
    /* Summary bar                                                          */
    /* ------------------------------------------------------------------ */
    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 1rem 1.25rem;
      transition: background var(--transition), border-color var(--transition);
    }
    .stat-card:hover {
      background: var(--surface-hov);
      border-color: var(--border-hov);
    }

    .stat-label {
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.35rem;
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: -1px;
      background: linear-gradient(90deg, #e8eaf0 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ------------------------------------------------------------------ */
    /* Section label                                                        */
    /* ------------------------------------------------------------------ */
    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ------------------------------------------------------------------ */
    /* Incident cards                                                       */
    /* ------------------------------------------------------------------ */
    .incidents { display: flex; flex-direction: column; gap: 1rem; }

    .incident-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      padding: 1.5rem;
      overflow: hidden;
      transition: background var(--transition), border-color var(--transition), transform var(--transition);
      animation: fadeUp 0.4s ease both;
    }
    .incident-card:hover {
      background: var(--surface-hov);
      border-color: var(--border-hov);
      transform: translateY(-2px);
    }

    /* Rank stripe on the left */
    .incident-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 3px 0 0 3px;
    }
    .incident-card.rank-1::before { background: linear-gradient(180deg, var(--red), var(--orange)); }
    .incident-card.rank-2::before { background: linear-gradient(180deg, var(--orange), var(--yellow)); }
    .incident-card.rank-3::before { background: linear-gradient(180deg, var(--yellow), var(--blue)); }

    .card-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .card-rank {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .card-title {
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      margin-top: 0.2rem;
      word-break: break-all;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.7rem;
      border-radius: 99px;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .badge-coord   { background: rgba(248,113,113,0.12); color: var(--red);    border: 1px solid rgba(248,113,113,0.25); }
    .badge-agent   { background: rgba(251,146,60,0.12);  color: var(--orange); border: 1px solid rgba(251,146,60,0.25); }
    .badge-info    { background: rgba(251,191,36,0.12);  color: var(--yellow); border: 1px solid rgba(251,191,36,0.25); }
    .badge-env     { background: rgba(96,165,250,0.12);  color: var(--blue);   border: 1px solid rgba(96,165,250,0.25); }
    .badge-unknown { background: rgba(167,139,250,0.12); color: var(--purple); border: 1px solid rgba(167,139,250,0.25); }

    /* Metrics row */
    .card-metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .metric {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .metric-label {
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .metric-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }

    /* Score gauge */
    .score-gauge {
      position: relative;
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      margin-top: 0.4rem;
      overflow: hidden;
    }
    .score-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
    }
    .rank-1 .score-fill { background: linear-gradient(90deg, var(--orange), var(--red)); }
    .rank-2 .score-fill { background: linear-gradient(90deg, var(--yellow), var(--orange)); }
    .rank-3 .score-fill { background: linear-gradient(90deg, var(--blue), var(--purple)); }

    /* Recovery bar */
    .recovery-bar {
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      margin-top: 0.4rem;
      overflow: hidden;
    }
    .recovery-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--green), #10b981);
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1) 0.15s;
    }

    /* Explanation */
    .card-explanation {
      font-size: 0.82rem;
      color: #9ca3af;
      line-height: 1.65;
      padding: 0.9rem 1rem;
      background: rgba(0,0,0,0.2);
      border-radius: 8px;
      border-left: 2px solid rgba(255,255,255,0.06);
      margin-bottom: 1rem;
    }

    /* Next action */
    .next-action {
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      font-size: 0.78rem;
      color: #a5b4fc;
    }
    .next-action-icon {
      font-size: 0.9rem;
      flex-shrink: 0;
      margin-top: 0.1rem;
    }

    /* ------------------------------------------------------------------ */
    /* Empty / error states                                                 */
    /* ------------------------------------------------------------------ */
    .empty-state {
      text-align: center;
      padding: 3rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--card-radius);
      color: var(--muted);
    }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .empty-state p { font-size: 0.9rem; line-height: 1.6; max-width: 400px; margin: 0 auto; }
    .empty-state code {
      font-family: 'JetBrains Mono', monospace;
      background: rgba(255,255,255,0.06);
      padding: 0.1em 0.4em;
      border-radius: 4px;
      font-size: 0.85em;
    }

    .loading-spinner {
      display: inline-block;
      width: 1em;
      height: 1em;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }

    /* ------------------------------------------------------------------ */
    /* Footer                                                               */
    /* ------------------------------------------------------------------ */
    .footer {
      margin-top: 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      border-top: 1px solid var(--border);
      padding-top: 1.25rem;
    }

    .footer-left { font-size: 0.75rem; color: var(--muted); }
    .footer-left a { color: var(--accent); text-decoration: none; }
    .footer-left a:hover { text-decoration: underline; }

    .copy-btn {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: inherit;
      font-size: 0.75rem;
      padding: 0.4rem 0.8rem;
      border-radius: 7px;
      cursor: pointer;
      transition: all var(--transition);
    }
    .copy-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .copy-btn.copied {
      border-color: var(--green);
      color: var(--green);
    }

    /* ------------------------------------------------------------------ */
    /* Animations                                                           */
    /* ------------------------------------------------------------------ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Stagger card animations */
    .incident-card:nth-child(1) { animation-delay: 0.05s; }
    .incident-card:nth-child(2) { animation-delay: 0.12s; }
    .incident-card:nth-child(3) { animation-delay: 0.19s; }

    /* ------------------------------------------------------------------ */
    /* Responsive                                                           */
    /* ------------------------------------------------------------------ */
    @media (max-width: 600px) {
      .summary { grid-template-columns: repeat(2, 1fr); }
      .card-metrics { grid-template-columns: repeat(2, 1fr); }
      .stat-value { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
<div class="page">

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <div class="logo-icon">&#x26A1;</div>
      <div>
        <div class="logo-text">triage</div>
        <div class="logo-sub">Agent Observability</div>
      </div>
    </div>
    <div class="header-meta">
      <span class="countdown" id="countdown">--</span>
      <button class="refresh-btn" id="refreshBtn" onclick="fetchReport()">
        <span id="refreshIcon">&#x21BB;</span> Refresh
      </button>
    </div>
  </header>

  <!-- Summary stats -->
  <div class="summary" id="summary">
    <div class="stat-card">
      <div class="stat-label">Runs analyzed</div>
      <div class="stat-value" id="statRuns">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Patterns detected</div>
      <div class="stat-value" id="statPatterns">--</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Last updated</div>
      <div class="stat-value" id="statTime" style="font-size:1rem;letter-spacing:0">--</div>
    </div>
  </div>

  <!-- Incidents -->
  <div class="section-label">Top incidents this cycle</div>
  <div class="incidents" id="incidents">
    <div class="empty-state">
      <div class="icon"><span class="loading-spinner"></span></div>
      <p>Loading triage report...</p>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-left">
      <strong>triage</strong> &mdash; severity scoring for multi-agent traces &middot;
      <a href="/report" target="_blank">raw markdown</a> &middot;
      <a href="/api/report" target="_blank">JSON API</a> &middot;
      <a href="/health" target="_blank">health</a>
    </div>
    <button class="copy-btn" id="copyBtn" onclick="copyMarkdown()">
      &#x2398; Copy markdown
    </button>
  </footer>

</div>

<script>
  const REFRESH_MS = 60_000;
  let _reportMd = '';
  let _countdown = REFRESH_MS;
  let _timer = null;

  // ---------- Classification config ----------
  const CLASS_CONFIG = {
    'coordination_failure': { label: 'Coordination Failure', badgeClass: 'badge-coord',  dot: '&#x1F534;' },
    'agent_error':          { label: 'Agent Error',          badgeClass: 'badge-agent',  dot: '&#x1F7E0;' },
    'information_lag':      { label: 'Information Lag',      badgeClass: 'badge-info',   dot: '&#x1F7E1;' },
    'environment_constraint':{ label: 'Env Constraint',      badgeClass: 'badge-env',    dot: '&#x1F535;' },
    'unclassified':         { label: 'Unclassified',         badgeClass: 'badge-unknown',dot: '&#x26AA;' },
  };

  function classConfig(cls) {
    return CLASS_CONFIG[cls] || CLASS_CONFIG['unclassified'];
  }

  // ---------- Fetch report ----------
  async function fetchReport() {
    document.getElementById('refreshIcon').style.opacity = '0.4';
    try {
      const [apiResp, mdResp] = await Promise.all([
        fetch('/api/report'),
        fetch('/report'),
      ]);
      const data = await apiResp.json();
      _reportMd = await mdResp.text();
      renderReport(data);
    } catch (e) {
      renderError('Could not reach /api/report. Is the triage service running?');
    }
    document.getElementById('refreshIcon').style.opacity = '1';
    resetCountdown();
  }

  // ---------- Render ----------
  function renderReport(data) {
    document.getElementById('statRuns').textContent = data.total_runs ?? '--';
    document.getElementById('statPatterns').textContent = data.total_patterns ?? '--';

    if (data.generated_at) {
      const d = new Date(data.generated_at);
      document.getElementById('statTime').textContent = d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    }

    const container = document.getElementById('incidents');

    if (data.error && (!data.incidents || data.incidents.length === 0)) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">&#x1F4C2;</div>
          <p>${escHtml(data.error)}<br><br>
          Drop <code>.ndjson</code> files into your <code>runs/</code> directory, then refresh.</p>
        </div>`;
      return;
    }

    if (!data.incidents || data.incidents.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">&#x2705;</div>
          <p>No incidents detected. All agents completed their turns cleanly.</p>
        </div>`;
      return;
    }

    container.innerHTML = data.incidents.map((inc, idx) => {
      const rank = idx + 1;
      const cfg = classConfig(inc.failure_classification);
      const scorePercent = Math.min(100, (inc.final_score / 15) * 100).toFixed(1);
      const recoveryPercent = (inc.recovery_rate * 100).toFixed(0);

      return `
        <div class="incident-card rank-${rank}">
          <div class="card-top">
            <div>
              <div class="card-rank">#${rank} INCIDENT</div>
              <div class="card-title">${escHtml(inc.pattern_name)}</div>
            </div>
            <span class="badge ${cfg.badgeClass}">${cfg.dot} ${cfg.label}</span>
          </div>

          <div class="card-metrics">
            <div class="metric">
              <div class="metric-label">Final Score</div>
              <div class="metric-value">${inc.final_score}</div>
              <div class="score-gauge">
                <div class="score-fill" style="width:${scorePercent}%"></div>
              </div>
            </div>
            <div class="metric">
              <div class="metric-label">Severity</div>
              <div class="metric-value">${inc.severity_score}</div>
            </div>
            <div class="metric">
              <div class="metric-label">Frequency</div>
              <div class="metric-value">${inc.frequency}x</div>
            </div>
            <div class="metric">
              <div class="metric-label">Recovery</div>
              <div class="metric-value">${recoveryPercent}%</div>
              <div class="recovery-bar">
                <div class="recovery-fill" style="width:${recoveryPercent}%"></div>
              </div>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  function renderError(msg) {
    document.getElementById('incidents').innerHTML = `
      <div class="empty-state">
        <div class="icon">&#x26A0;&#xFE0F;</div>
        <p>${escHtml(msg)}</p>
      </div>`;
  }

  // ---------- Copy markdown ----------
  async function copyMarkdown() {
    if (!_reportMd) return;
    try {
      await navigator.clipboard.writeText(_reportMd);
      const btn = document.getElementById('copyBtn');
      btn.classList.add('copied');
      btn.textContent = '&#x2713; Copied';
      setTimeout(() => {
        btn.classList.remove('copied');
        btn.innerHTML = '&#x2398; Copy markdown';
      }, 2000);
    } catch (_) {}
  }

  // ---------- Countdown timer ----------
  function resetCountdown() {
    _countdown = REFRESH_MS;
    updateCountdown();
  }

  function updateCountdown() {
    const secs = Math.ceil(_countdown / 1000);
    document.getElementById('countdown').textContent = `refresh in ${secs}s`;
  }

  function tickCountdown() {
    _countdown -= 1000;
    if (_countdown <= 0) {
      fetchReport();
    } else {
      updateCountdown();
    }
  }

  // ---------- Utilities ----------
  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ---------- Boot ----------
  fetchReport();
  setInterval(tickCountdown, 1000);
</script>
</body>
</html>
