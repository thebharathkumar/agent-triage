---
# OTel Collector config for triage observability pipeline
# Extends prove-ai's config with:
#   - fileexporter: writes accepted spans as NDJSON to shared volume
#   - namespace changed to "traces" (more generic than "llm")

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch: {}

connectors:
  spanmetrics:
    histogram:
      explicit:
        buckets: [0.001, 0.005, 0.01, 0.05, 0.1, 0.5, 1, 5, 10]
    dimensions:
      - name: env
      - name: component
      - name: agent_id
      - name: failure_classification
    dimensions_cache_size: 1000

exporters:
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: traces
    resource_to_telemetry_conversion:
      enabled: true
    enable_open_metrics: true

  # Writes spans to shared volume so triage service can score them
  file:
    path: /var/spans/spans.jsonl
    rotation:
      max_megabytes: 100
      max_days: 3
      max_backups: 5

  debug:
    verbosity: detailed

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  telemetry:
    metrics:
      level: detailed
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
    logs:
      level: info
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [spanmetrics, file, debug]
    metrics:
      receivers: [otlp, spanmetrics]
      processors: [batch]
      exporters: [prometheus]
